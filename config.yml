device: "cuda"

model:
  name: "small"
  target_h: 64

  backbone:
    type: "resnet"
    channels: [64, 128, 256, 256]

  neck:
    type: "linear"
    dropout: 0.1

  head:
    type: "transformer_ctc"
    d_model: 256
    nhead: 4
    num_layers: 4
    dim_feedforward: 1024
    dropout: 0.1

train:
  epochs: 50
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 5.0
  num_workers: 8
  pin_memory: true

  data_root: "khmer-ocr-synth-v1"
  train_txt: "khmer-ocr-synth-v1/train.txt"
  val_txt: "khmer-ocr-synth-v1/val.txt"

  checkpoint_dir: "checkpoints"
  save_every: 5
  log_interval: 50

  aug_enabled: true
